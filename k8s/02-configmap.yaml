apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-task-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGO_URI: "mongodb://mongo:27017/ai_task_platform"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  QUEUE_NAME: "ai-tasks"
  JWT_EXPIRES_IN: "7d"
  CLIENT_ORIGIN: "http://ai-task-platform.local"
  BACKEND_API_URL: "http://backend:5000/api"
  WORKER_CONCURRENCY: "2"
