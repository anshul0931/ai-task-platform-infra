apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-task-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: anshul0931/ai-task-worker:b817e908f61eb0c97cb021ec07cff896aabe2b41
          envFrom:
            - configMapRef:
                name: ai-task-config
          env:
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef: { name: ai-task-secrets, key: INTERNAL_API_KEY }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
