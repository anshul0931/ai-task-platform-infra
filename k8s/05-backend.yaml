apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ai-task-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: anshul0931/ai-task-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ai-task-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: ai-task-secrets, key: JWT_SECRET }
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef: { name: ai-task-secrets, key: INTERNAL_API_KEY }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ai-task-platform
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
